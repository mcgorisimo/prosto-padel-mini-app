name: prosto-padel-test

services:
  postgres:
    image: ${TEST_POSTGRES_IMAGE:-postgres:14-bookworm}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB:-prosto_padel_test_migration_cycle}
      POSTGRES_USER: ${TEST_POSTGRES_USER:-prosto_padel_test}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-local_test_password_only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - test_internal

  backend:
    build:
      context: ../../backend
      args:
        NODE_IMAGE: ${TEST_NODE_IMAGE:-node:20.11.0-bookworm-slim}
    restart: unless-stopped
    environment:
      NODE_ENV: test
      HOST: 0.0.0.0
      PORT: "3000"
      CRM_PROVIDER: disabled
      DATABASE_ENABLED: "true"
      DATABASE_URL: postgresql://${TEST_POSTGRES_USER:-prosto_padel_test}:${TEST_POSTGRES_PASSWORD:-local_test_password_only}@postgres:5432/${TEST_POSTGRES_DB:-prosto_padel_test_migration_cycle}
      TELEGRAM_AUTH_ENABLED: "false"
      TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_INIT_DATA_MAX_AGE_SECONDS: ""
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - test_internal

  nginx:
    image: ${TEST_NGINX_IMAGE:-nginx:1.27.4-alpine}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:8080/api/v1/health >/dev/null
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s
    networks:
      - test_internal

  db-tools:
    image: ${TEST_POSTGRES_IMAGE:-postgres:14-bookworm}
    working_dir: /workspace
    profiles:
      - tools
    restart: "no"
    environment:
      EXPECTED_TEST_DATABASE_HOST: ${EXPECTED_TEST_DATABASE_HOST:-postgres}
      DATABASE_HOST: ${DATABASE_HOST:-postgres}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_NAME: ${DATABASE_NAME:-prosto_padel_test_migration_cycle}
      DATABASE_USER: ${DATABASE_USER:-prosto_padel_test}
      PGPASSWORD: ${TEST_POSTGRES_PASSWORD:-local_test_password_only}
    volumes:
      - ../../docs/migrations:/workspace/migrations:ro
      - ./sql:/workspace/test/sql:ro
      - ./scripts:/workspace/test/scripts:ro
      - ./backups:/workspace/test/backups
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - psql
      - --version
    networks:
      - test_internal

networks:
  test_internal:
    internal: true

volumes:
  postgres_data:
