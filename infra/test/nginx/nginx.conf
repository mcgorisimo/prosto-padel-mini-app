upstream prosto_padel_backend {
    server backend:3000;
}

server {
    listen 8080;
    server_name _;
    server_tokens off;

    location /api/ {
        proxy_pass http://prosto_padel_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
